<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-container {
            width: 400px;
        }

        label {
            font-size: 18px;
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            font-size: 18px;
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .checkbox-group input {
            width: auto;
            margin-right: 10px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Add Property</h1>
        <form method="post">

            <label for="property_name">Property Name</label>
            <input type="text" id="property_name" name="property_name">

            <label for="category">Category</label>
            <input type="text" id="category" name="category">

            <label for="property_address">Address</label>
            <input type="text" id="property_address" name="property_address">

            <label for="property_zipcode">Zipcode</label>
            <input type="text" id="property_zipcode" name="property_zipcode">

            <label for="property_city">City</label>
            <input type="text" id="property_city" name="property_city">

            <label for="property_state">State</label>
            <input type="text" id="property_state" name="property_state">

            <label for="owner_name">Property Owner Name</label>
            <input type="text" id="owner_name" name="owner_name">

            <label for="contact_phone">Contact Phone Number</label>
            <input type="text" id="contact_phone" name="contact_phone">

            <label for="email">Email</label>
            <input type="text" id="email" name="email">

            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>

            <div class="checkbox-group">
                <input type="checkbox" id="use_random_id" name="use_random_id" value="1" checked>
                <label for="use_random_id">Use Random ID</label>
            </div>

            <label for="property_id">Property ID</label>
            <input type="text" id="property_id" name="property_id" {% if use_random_id %}readonly{% endif %} value="{{ property_id }}">

            <input type="submit" class="submit-btn" value="Add Property">
        </form>
    </div>
</body>
</html>
