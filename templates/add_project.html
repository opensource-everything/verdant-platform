<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Project</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style type="text/css">
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .form-container {
      display: flex;
      gap: 20px;
      background: #fff;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 5px;
    }
    .section {
      width: 400px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }
    label {
      font-size: 18px;
      display: block;
      margin-top: 10px;
    }
    input, textarea, select {
      font-size: 18px;
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }
    .checkbox-group input {
      width: auto;
      margin-right: 10px;
    }
    .submit-btn {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="section">
      <h1>Add Project</h1>
      <form method="post">
        <label for="project_name">Project Name</label>
        <input type="text" id="project_name" name="project_name">

        <label for="start_date">Start Date</label>
        <input type="date" id="start_date" name="start_date">

        <label for="material_cost_estimate">Material Cost Estimate</label>
        <input type="text" id="material_cost_estimate" name="material_cost_estimate">

        <label for="material_cost_actual">Material Cost Actual</label>
        <input type="text" id="material_cost_actual" name="material_cost_actual">

        <label for="labor_bid">Labor Bid</label>
        <input type="text" id="labor_bid" name="labor_bid">

        <label for="labor_cost_actual">Labor Cost Actual</label>
        <input type="text" id="labor_cost_actual" name="labor_cost_actual">

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes"></textarea>
    </div>
    <div class="section">
        <label for="project_status">Status</label>
        <select id="project_status" name="project_status">
          <option value="in-progress">In Progress</option>
          <option value="pending">Pending Approval</option>
          <option value="bid">Bid</option>
        </select>

        <label for="scope_of_work">Scope of Work</label>
        <textarea id="scope_of_work" name="scope_of_work"></textarea>

        <label for="client">Clients</label>
        <select id="client" name="client">
        {% for client in clients  %}
          <option value="{{ client[2] }}">{{ client[2] }}</option>
        {% endfor  %}
        </select>

        <label for="service">Service Plan</label>
        <select id="service" name="service">
          <option value="landscaping">Basic Maintenance</option>
          <option value="landscaping">Standard Maintenance</option>
          <option value="landscaping">Premium Maintenance</option>
          <option value="maintenance">Maintenance</option>
          <option value="design">Design</option>
        </select>

        <label for="material">Material</label>
        <select id="material" name="material">
          <option value="gravel">Gravel</option>
          <option value="mulch">Mulch</option>
          <option value="pavers">Pavers</option>
        </select>

        <div class="checkbox-group">
          <input type="checkbox" id="use_random_id" name="use_random_id" value="1" checked>
          <label for="use_random_id">Use Random ID</label>
        </div>

        <label for="project_id">Project ID</label>
        <input type="text" id="project_id" name="project_id" {% if use_random_id %}readonly{% endif %} value="{{ product_id }}">

        <input class="submit-btn" type="submit" value="Add Project +">
      </form>
    </div>
  </div>
</body>
</html>
