<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style type="text/css">
        .modal-popup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .modal-popup-element {
            display: inline-block;
            padding: 20px;
            margin: 20px;
            border-radius: 1em;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            background-color: #f9f9f9;
            width: 750px;
        }

        form {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .client-section, .address-section {
            width: 48%;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        /* Ensure the description (textarea) matches the width of other inputs */
        textarea {
            resize: vertical;
            height: 100px;
        }

        .submit-btn {
            font-size: 14px;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }

        /* Grouping and aligning the checkbox + Client ID input */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px; /* Adds space between checkbox and label */
            margin-top: 10px;
        }

        .checkbox-container input {
            width: auto; /* Checkbox should not take full width */
            margin: 0;
        }

        .client-id-container {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="modal-popup-container">
    <div class="modal-popup-element">
        <h1>Add Client</h1>
        <form method="post">
            <!-- Client Information Section -->
            <div class="client-section">
                <label for="client_name">Client Name</label>
                <input type="text" id="client_name" name="client_name">

                <label for="client_number">Phone Number</label>
                <input type="text" id="client_number" name="client_number">

                <label for="client_email">Email</label>
                <input type="email" id="client_email" name="client_email">

                <label for="description">Notes</label>
                <textarea id="description" name="description"></textarea>

                <!-- Checkbox and Client ID in a neat row -->
                <div class="checkbox-container">
                    <input type="checkbox" id="use_random_id" name="use_random_id" value="1" checked>
                    <label for="use_random_id">Generate Random ID?</label>
                </div>

                <div class="client-id-container">
                    <label for="client_id">Client ID</label>
                    <input type="text" id="client_id" name="client_id" {% if use_random_id %}readonly{% endif %} value="{{ product_id }}">
                </div>
            </div>

            <!-- Address Section -->
            <div class="address-section">
                <label for="street">Street</label>
                <input type="text" id="street" name="street">

                <label for="unit">Unit, Space, or Apartment #</label>
                <input type="text" id="unit" name="unit">

                <label for="city">City</label>
                <input type="text" id="city" name="city">

                <label for="state">State</label>
                <input type="text" id="state" name="state">

                <label for="zipcode">Zipcode</label>
                <input type="text" id="zipcode" name="zipcode">
            </div>

            <!-- Submit Button -->
            <input class="submit-btn" type="submit" value="Add Client">
        </form>
    </div>
</div>

</body>
</html>
