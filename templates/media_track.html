<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Automation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style type="text/css">
        table {
            margin: 10px;
        }

        th {
            padding: 15px;
            font-size: 12px;
        }

        .list-section {
            position: absolute;
            top: 60px;
            left: 250px;
        }

        .btn {
            margin: 10px;
            padding: 10px;
        }

        .gallery-container {
            display: flex;
            gap: 10px;
        }

        img {
            width: 200px;
            height: 200px;
        }

        .media-card, .post-card {
            border: 1px solid;
            border-radius: 1px;
            border-width: 1px;
            border-radius: 1rem;
            margin: 10px;
            padding: 10px;
        }

        .hidden {
            display: none;
        }

        .operation-section a, .add-btn {
            font-size: 10px;
            font-weight: 2px;
            text-decoration: none;
            text-align: center;
            height: 10px;
            margin: 10px;
            display: inline-block;
            border-radius: 0.4em;
            border-style: solid;
            border-width: 0.1em;
            background-color: #f44336;
            display: inline-block;
            padding: 6px;
        }


    </style>

</head>
<body>
<body>
    <h1>Media Gallery</h1>

    <div class="side-bar">
        <h3>Folders</h3>
        <div class="folders">
            <a class="add-btn" href="{{ url_for('add_service') }}">Add Folders +</a>
        </div>

        <h3>Tags</h3>
        <div class="tags">
            <a class="add-btn" href="{{ url_for('add_service') }}">Add Tag +</a>
        </div>
    </div>

    <div class="gallery-container">
        <h2>Folders</h2>
        <div class="folder-section">
            <div class="media-card">
                <img src="">
                <p>filename.png</p>
            </div>
        </div>

        <h2>Files</h2>
        <div class="file-section">
            <div class="media-card">
                <img src="">
                <p>filename.png</p>
            </div>
        </div>

        
    </div>



<script type="text/javascript">
    function toggleDiv() {
        var div = document.getElementById("create-post-form")
        var div2 = document.getElementById("post-form")

        if (div.classList.contains("hidden")){
            div.classList.remove('hidden');
        } else {
            div.classList.add('hidden')
        }
        if (div2.classList.contains("hidden")){
            div2.classList.remove('hidden');
        } else {
            div2.classList.add('hidden')
        }
    }

    toggleDiv()
</script>

</body>
</html>
