<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>

        .dropdown-content {
            display: none;

            position: absolute;
            padding: 12px 16px;
            margin: 10px 12px;
            z-index: 1;
        }

        .product-categories a {
            text-decoration: none;
        }

        .dropdown-content a {
            text-decoration: none;
            padding: 5px 5px;
            margin: 5px 5px;
        }

        .dropdown {
            padding: 10px 10px;
            margin: 10px 10px;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .product-categories {
            position: absolute;
            top: 50px;

        }

        .product-gallery {
            position: absolute;
            left: 200px;
            top: 50px;
        }
        
        .product-card {
            border: solid 1px;
            width: 220px;
            height: 300px;
            border-radius: 1em;
        }

        .product-image {
            border-radius: 1em;
            position: relative;
            left: 10px;
            top: 10px;
            width: 200px;
            height: 200px;
        }

    </style>
</head>
<body>

    
    <div class="product-categories">

        <div class="dropdown">
            <a href="#tools">Tools</a>
            <div class="dropdown-content">
                <a href="#handtools">Hand Tools</a>
                <a href="#gardening">Gardening</a>
                <a href="#woodworking">Woodworking</a>
                <a href="#automotive">Automotive</a>
                <a href="#measuring">Measuring and Layout</a>
                <a href="#painting">Painting</a>
                <a href="#plumbing">Plumbing</a>
                <a href="#electrical">Electrical</a>
                <a href="#cleaning">Cleaning</a>
                <a href="#hvac">HVAC</a>
                <a href="#metalworking">Metalworking</a>
                <a href="#electronic-repair">Electronic Repair</a>
                <a href="#safety-equipment">Safety Equipment</a>
            </div>
        </div>

        <div class="dropdown">
            <a href="#apparel">Work Wear Essentials</a>
            <div class="dropdown-content">
                <a href="#boots">High Visibility Gear</a>
                <a href="#boots">Boots</a>
                <a href="#boots">Hats</a>
                <a href="#boots">Pants</a>
                <a href="#boots">Shirts</a>
            </div>
        </div>

        
    </div>


    <div class="product-gallery">
        <h1>Products</h1>
        
        <div class="product-card">
            <img src="" alt="" class="product-image">
            <p>Product Name</p>
            <p>$Price</p>
            <div class="bookmark">

            </div>
            <div class="cart">

            </div>
        </div>

    </div>

        <label for="use_random_id">Use Random Product ID</label><br><br>
        <label for="product_id">Product ID:</label><br>
        <input type="text" id="product_id" name="product_id" {% if use_random_id %}readonly{% endif %} value="{{ product_id }}"><br><br>
        <input type="submit" value="Submit">
    </form>
    -->
    
</body>
</html>
